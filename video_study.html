/* ============================================================

   ============================================================ */

  --md-primary-container: #1a365d;
  --md-on-primary:     #ffffff;

  --md-secondary-container: #fef3c7;
  --md-on-secondary:   #1a1a2e;
  --md-surface:         #ffffff;
  --md-surface-variant: #f3f4f6;
  --md-surface-dark:    #162032;
  --md-surface-variant-dark: #1a2744;
  --md-background:     #ffffff;
  --md-background-dark: #1a1a2e;
  --md-on-surface:     #1a1a2e;

  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 40px;

  --font-size-xs:  0.75rem; --font-size-sm: 0.875rem;
  --font-size-base: 1rem; --font-size-lg: 1.125rem;
  --text-primary: #1a1a2e; --text-secondary: #4a5568; --text-muted: #6b7280;

  --shadow-card: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-elevated: 0 4px 12px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
}

@media (prefers-color-scheme: dark) {
  :root {
    --md-primary:        #1a365d;
    --md-surface:        #162032;
    --md-surface-variant: #1a2744;
    --md-background:    #1a1a2e;
    --md-on-surface:     #e0e0e0;
    --md-on-surface-muted: #9ca3af;
    --md-outline:       #374151;
    --text-primary:     #e0e0e0;
    --text-secondary:   #9ca3af;
    --text-muted:       #6b7280;
  }
  body { background-color: var(--md-background); color: var(--md-on-surface); }
}

body.dark-mode {
  --md-surface:       #162032;
  --md-surface-variant: #1a2744;
  --md-background:   #1a1a2e;
  --md-on-surface:   #e0e0e0;

}

/* ============================================================
   Reset & Base
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-family);background:#f3f4f6;color:#1a1a1a;line-height:1.6;min-height:100vh}
a{color:var(--md-secondary);text-decoration:none;transition:color .2s}
a:hover{color:var(--md-secondary-container)}
*:focus-visible{outline:2px solid var(--md-secondary);outline-offset:2px}

/* ============================================================
   Navbar — aligned with index.html
   ============================================================ */
.navbar{
  position:fixed;top:0;left:0;right:0;height:var(--navbar-height);
  background:rgba(var(--md-primary-rgb),.97);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 var(--sp-10);box-shadow:0 2px 8px rgba(0,0,0,.15)
}
.nav-brand{color:var(--text-inverse);font-size:var(--font-size-lg);font-weight:600;white-space:nowrap}
.nav-brand span{color:var(--md-secondary)}
.nav-links{display:flex;align-items:center;gap:var(--sp-1)}
.nav-link{
  color:rgba(255,255,255,.65);text-decoration:none;padding:var(--sp-2) var(--sp-3);
  border-radius:var(--radius-sm);font-size:var(--font-size-sm);font-weight:500;
  transition:background .2s,color .2s;white-space:nowrap
}
.nav-link:hover{color:#fff;background:rgba(201,162,39,.15)}
.nav-link.active{color:var(--md-secondary)}
.theme-toggle{
  padding:var(--sp-2) var(--sp-4);background:var(--md-secondary);border:none;
  border-radius:var(--radius-sm);cursor:pointer;font-size:var(--font-size-sm);
  font-weight:500;color:var(--md-on-secondary);transition:opacity .2s;white-space:nowrap
}
.theme-toggle:hover{opacity:.85}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:var(--sp-2)}
.hamburger span{width:24px;height:2px;background:#fff;border-radius:2px;transition:all .3s}
.nav-drawer{
  display:none;position:fixed;top:var(--navbar-height);left:0;right:0;
  background:rgba(var(--md-primary-rgb),.98);padding:var(--sp-4) var(--sp-6);
  flex-direction:column;gap:var(--sp-2);z-index:999;
  box-shadow:0 4px 12px rgba(0,0,0,.2)
}
.nav-drawer.open{display:flex}
.nav-drawer .nav-link{color:rgba(255,255,255,.8);font-size:var(--font-size-base);padding:var(--sp-3) var(--sp-4)}

/* ============================================================
   Video Study Layout
   ============================================================ */
.main-content{padding-top:var(--navbar-height);max-width:900px;margin:0 auto;background:var(--md-surface);min-height:100vh}
.vid-list{padding:16px;display:grid;gap:16px}
.vid-card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.vid-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12);border-color:#c9a227}
.vid-card.active{border-color:#c9a227;box-shadow:0 0 0 2px rgba(201,162,39,.2)}
.vid-thumb{width:100%;aspect-ratio:16/9;background:#0a1628;display:flex;align-items:center;justify-content:center;position:relative}
.vid-thumb img{width:100%;height:100%;object-fit:cover}
.vid-thumb .play-icon{position:absolute;background:rgba(201,162,39,.9);width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#0a1628}
.vid-info{padding:14px 16px}
.vid-title{font-size:.95rem;font-weight:600;color:#1a1a2e;margin-bottom:6px;line-height:1.4}
.vid-meta{font-size:.78rem;color:#6b7280;display:flex;gap:12px;flex-wrap:wrap}
.vid-meta span{display:flex;align-items:center;gap:4px}
.vid-yt-link{display:inline-flex;align-items:center;gap:6px;background:#c9a227;color:#0a1628;padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;text-decoration:none;margin-top:8px}
.vid-yt-link:hover{background:#b8922a}
.vid-segments{padding:16px;border-top:1px solid #e5e7eb}
.seg{padding:12px;margin-bottom:8px;border-radius:8px;border:1px solid #e5e7eb;background:#fafafa;cursor:pointer;transition:all .15s}
.seg:hover{border-color:#c9a227}
.seg-time{font-size:.72rem;font-weight:700;color:#c9a227;margin-bottom:4px}
.seg-zh{font-size:.85rem;color:#374151;line-height:1.7}
.seg-en{font-size:.78rem;color:#555;background:#f3f4f6;padding:8px 10px;border-radius:6px;line-height:1.7;max-height:0;overflow:hidden;transition:max-height .3s;margin-top:8px}
.seg-en.open{max-height:400px}
.seg-exp{font-size:.75rem;color:#c9a227;cursor:pointer;user-select:none;margin-top:4px;display:inline-block}
.seg-jmp{font-size:.75rem;color:#c9a227;font-weight:600;text-decoration:none;padding:4px 10px;border:1px solid #c9a227;border-radius:20px;display:inline-block;margin-top:8px;transition:all .2s}
.seg-jmp:hover{background:#c9a227;color:#0a1628}
.empty-seg{padding:24px;text-align:center;color:#9ca3af;font-size:.85rem}
footer{padding:10px 16px;background:#f9fafb;border-top:1px solid #e5e7eb;font-size:.75rem;color:#6b7280;display:flex;justify-content:space-between}
footer a{color:#c9a227;text-decoration:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0a1628;color:#fff;padding:8px 20px;border-radius:30px;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:1000;pointer-events:none}
.toast.on{opacity:1}
@media(max-width:600px){.vid-list{padding:12px}.vid-info{padding:12px}}
@media(max-width:768px){
  :root{--sp-10:20px}
  .navbar{padding:0 var(--sp-5)}
  .nav-links{display:none}
  .hamburger{display:flex}
  .main-content{padding-top:var(--navbar-height)}
}
@media(prefers-color-scheme:dark){
.vid-card{background:#162032;border-color:#333}
.vid-title{color:#e0e0e0}
.vid-meta{color:#9ca3af}
.vid-segments{border-color:#333}
.seg{background:#1a2744;border-color:#333}
.seg-zh{color:#c0c0c0}
.seg-en{background:#0f0f23;border-color:#444;color:#b0b0b0}
footer{background:#0d1b2a;color:#888}
}
</style>

<script>
var VIDEOS=[
{id:"b2yxBBMIEz0",title:"CCBC Fireside Chat on Value Investing in China",channel:"Columbia China Business Conference",desc:"Li Lu x Bruce Greenwald at Columbia. The definitive Li Lu interview covering moat, trust, DCF, China opportunities.",duration:"1h32m",hasTranscript:true},
{id:"KAoC8pErmb0",title:"The Chinese Warren Buffett: Billionaire Investing Legend Li Lu",channel:"We Study Billionaires",desc:"Comprehensive profile of Li Lu - from Tiananmen Square to Himalaya Capital, his investment journey and philosophy.",duration:"~2h",hasTranscript:false},
{id:"KmzOZLf8wcw",title:"Li Lu's Secret to Investing Success (Short)",channel:"We Study Billionaires",desc:"Key success principles from Li Lu in a concise format.",duration:"~2min",hasTranscript:false},
{id:"LWikhUVneYI",title:"Li Lu On 2021 Investing, Value, China & More",channel:"CBS / YAPSS",desc:"Li Lu discusses 2021 market conditions, value investing approach, and China-specific opportunities.",duration:"~30min",hasTranscript:false},
{id:"-gfRCGZ0zf4",title:"How I Got Started In Value Investing (CBS 2021)",channel:"CBS / YAPSS",desc:"Li Lu shares how he discovered value investing through Buffett's lecture at Columbia.",duration:"~10min",hasTranscript:false},
{id:"YaCRr0DIfuE",title:"Investing in China: Unique Challenges & Opportunities",channel:"CBS / YAPSS",desc:"Li Lu on the unique aspects of investing in China - regulatory environment, competitive moats, and long-term view.",duration:"~25min",hasTranscript:false},
{id:"35RgNwcyjFk",title:"Li Lu explains his Holy Grail of Investing (FAME 2012)",channel:"YAPSS",desc:"Li Lu's famous 'Holy Grail' talk on finding businesses with durable competitive advantages.",duration:"~12min",hasTranscript:false},
{id:"IbrTswEKpLE",title:"Why Only 5% Win in Stocks",channel:"Timeless Gain",desc:"Li Lu on why most investors underperform and the importance of temperament.",duration:"~10min",hasTranscript:false},
{id:"_-M1HFuqus0",title:"Li Lu Explains Value Investing",channel:"Bald Investor",desc:"Clear explanation of value investing core concepts by Li Lu.",duration:"~10min",hasTranscript:false},
{id:"fiG",title:"Li Lu - How to Invest in Net-Net Stocks",channel:"YAPSS",desc:"Li Lu's approach to net-net working capital stocks - a classic Graham technique.",duration:"~15min",hasTranscript:false},
{id:"unknown-sfsu-2012",title:"Li Lu Speech - San Francisco State University 2012",channel:"YAPSS",desc:"Li Lu speaks at San Francisco State University on his investment philosophy.",duration:"TBD",hasTranscript:false}
]

var SEGMENTS={
"b2yxBBMIEz0":[
{id:1,t:"02:24",sp:"Host",lb:"Opening Introduction",zh:"主持人介绍 Bruce Greenwald 和李录。Bruce 是哥伦比亚商学院价值投资之父，培养了一代价值投资者包括李录在内。",en:"Live streaming from Columbia Business School. Welcome to the 13th Columbia China Business Conference. Joining us today are Professor Bruce Greenwald and Mr. Lee Liu."},
{id:2,t:"04:37",sp:"Bruce",lb:"Evolution of Investment",zh:"Bruce 开场：您的投资理念在过去28年是如何演变的？查理·芒格对您有什么影响？",en:"I've known Lee Liu for more than 20 years. How has your investment philosophy evolved? In what ways has Charlie Munger influenced you?"},
{id:3,t:"08:00",sp:"Li Lu",tp:"moat",lb:"From Graham to Munger",zh:"李录分享三阶段演进：1) 格雷厄姆雪茄烟蒂法 2) 优质小企业 3) 具有持久护城河的伟大企业。芒格的影响远超投资。",en:"Before I got exposed to value investing through Buffett's lecture at Bruce's class, my whole approach was along similar lines."},
{id:4,t:"12:30",sp:"Bruce",lb:"What Makes a Great Business",zh:"Bruce 追问：什么是伟大企业的具体特征？有哪些可量化的指标？",en:"What specifically do you look for in a great business? What are the characteristics that make a business truly outstanding?"},
{id:5,t:"12:42",sp:"Li Lu",tp:"moat",lb:"ROIC and Moat",zh:"三个标准：1) ROIC 持续高于平均水平 2) 真正的护城河 3) 长期持续增长赛道。符合这三个条件的伟大企业极其罕见。",en:"Great businesses are the ones who really have above average return on invested capital - but that kind of businesses socially attract imitators."},
{id:6,t:"15:00",sp:"Li Lu",tp:"character",lb:"Trust Moat",zh:"李录最强调的护城河：信任。最高形式的文明是无缝的、值得信赖的信任之网。",en:"The highest form which civilization can reach is a seamless web of deserved trust - not much procedure, just totally reliable people correctly trusting one another."},
{id:7,t:"19:00",sp:"Li Lu",tp:"moat",lb:"Constant Change",zh:"所有伟大企业都处于不断变化中。护城河必须不断重建才能保持相关性。",en:"All great businesses are in constant change. The moat must be continuously rebuilt to remain relevant."},
{id:8,t:"21:51",sp:"Bruce",lb:"How Do You Invest Differently",zh:"Bruce 提问：您的方法与其他价值投资者有什么本质区别？",en:"How do you invest differently from other value investors?"},
{id:9,t:"26:30",sp:"Li Lu",tp:"moat",lb:"From Small to Great",zh:"李录从完全不懂企业只看财报，演进到深入理解管理层。性格评估是艺术，不是科学。",en:"I evolved from not understanding business at all, just looking at financial statements, to deeply understanding management."},
{id:10,t:"33:00",sp:"Li Lu",tp:"value",lb:"Margin of Safety and DCF",zh:"DCF 是李录的核心估值工具，但关键是保守假设。",en:"I use DCF as the primary tool, but the key is being conservative with assumptions."},
{id:11,t:"38:00",sp:"Bruce",lb:"Generalist or Specialist",zh:"Bruce 提问：投资者应该是通才还是专才？在中国市场运作方式是否不同？",en:"Do you think investors should be generalists or specialists?"},
{id:12,t:"44:49",sp:"Li Lu",tp:"china",lb:"China World's Most Dynamic",zh:"中国30年来一直是全球最具活力的经济体，正在从投资驱动转向消费驱动。",en:"China has been the most dynamic economy in the world for the last 30 years, transitioning from investment-driven to consumption-driven economy."},
{id:13,t:"50:00",sp:"Li Lu",tp:"china",lb:"Opportunities Across Sectors",zh:"住房、服务、几乎所有行业都处于强劲增长阶段。关键是找到有护城河的好公司。",en:"Housing, services, virtually every industry is in a robust growth stage. The challenge in China is not finding opportunities."},
{id:14,t:"55:00",sp:"Bruce",lb:"Service Economy",zh:"Bruce 提问：中国的服务业有哪些机会和人才挑战？",en:"What opportunities do you see in China's service economy?"},
{id:15,t:"62:00",sp:"Bruce",lb:"Investment Mistakes",zh:"Bruce 提问：回顾您的职业生涯，您最大的投资错误是什么？",en:"Looking back on your career, what are some of your biggest investment mistakes?"},
{id:16,t:"62:01",sp:"Li Lu",tp:"china",lb:"Mistakes and Advice",zh:"错误是投资的必要部分——关键是快速学习。",en:"Mistakes are a necessary part of investing. The key is learning from them quickly."},
{id:17,t:"85:00",sp:"Li Lu",tp:"china",lb:"Asian-American Bridge",zh:"李录最后呼吁：全球经济中心正在从大西洋转向太平洋。",en:"The center of the global economy is shifting from the Atlantic to the Pacific."}
]};

function renderVideoList(){
  var list=document.getElementById("vid-list");
  var html="";
  for(var i=0;i<VIDEOS.length;i++){
    var v=VIDEOS[i];
    var ytUrl="https://www.youtube.com/watch?v="+v.id;
    var thumbUrl="https://img.youtube.com/vi/"+v.id+"/mqdefault.jpg";
    html+='<div class="vid-card" id="card-'+v.id+'" onclick="selectVideo(\''+v.id+'\')">';
    html+='<div class="vid-thumb">';
    html+='<img src="'+thumbUrl+'" alt="'+v.title+'" loading="lazy" onerror="this.style.display=\'none\'">';
    html+='<div class="play-icon">&#9654;</div>';
    html+='</div>';
    html+='<div class="vid-info">';
    html+='<div class="vid-title">'+v.title+'</div>';
    html+='<div class="vid-meta">';
    html+='<span>&#127916; '+v.channel+'</span>';
    html+='<span>&#9202; '+v.duration+'</span>';
    if(v.hasTranscript) html+='<span style="color:#c9a227">&#10003; Transcript</span>';
    html+='</div>';
    html+='<div style="font-size:.82rem;color:#6b7280;margin-top:8px">'+v.desc+'</div>';
    html+='<a href="'+ytUrl+'" target="_blank" class="vid-yt-link" onclick="event.stopPropagation()">&#9654; Watch on YouTube</a>';
    html+='</div></div>';
  }
  list.innerHTML=html;
}

function selectVideo(id){
  var card=document.getElementById("card-"+id);
  document.querySelectorAll(".vid-card").forEach(function(c){c.classList.remove("active")});
  card.classList.add("active");
  card.scrollIntoView({behavior:"smooth",block:"start"});
  var segs=SEGMENTS[id];
  var html='<div class="vid-segments">';
  if(segs&&segs.length>0){
    for(var i=0;i<segs.length;i++){
      var s=segs[i];
      var parts=s.t.split(":");
      var sec=parseInt(parts[0])*60+parseInt(parts[1]);
      var yt="https://www.youtube.com/watch?v="+id+"&t="+sec;
      html+='<div class="seg" id="seg-'+s.id+'">';
      html+='<div class="seg-time">&#9201; '+s.t+(s.sp?' &middot; '+s.sp:'')+'</div>';
      html+='<div class="seg-zh">'+s.zh+'</div>';
      html+='<div class="seg-en" id="en-'+s.id+'">'+s.en+'</div>';
      html+='<div class="seg-exp" onclick="toggleEn('+s.id+')">&#9658; Show English</div>';
      html+='<a href="'+yt+'" target="_blank" class="seg-jmp">&#9654; '+s.t+'</a>';
      html+='</div>';
    }
  }else{
    var yt="https://www.youtube.com/watch?v="+id;
    html+='<div class="empty-seg">No transcript segments available for this video yet. <a href="'+yt+'" target="_blank" class="vid-yt-link" style="margin-top:12px;display:inline-flex">&#9654; Watch on YouTube</a></div>';
  }
  html+='</div>';
  card.querySelector(".vid-info").insertAdjacentHTML("beforeend",html);
}

function toggleEn(id){
  var el=document.getElementById("en-"+id);
  if(!el)return;
  if(el.classList.contains("open")){
    el.classList.remove("open");
    el.previousElementSibling.textContent="\u25b8 Show English";
  }else{
    el.classList.add("open");
    el.previousElementSibling.textContent="\u25bc Hide English";
  }
}

function tst(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.className="toast on";
  setTimeout(function(){t.className="toast";},2500);
}
// Theme toggle
function toggleTheme(){
  document.body.classList.toggle('dark-mode');
  var btn=document.querySelector('.theme-toggle');
  btn.textContent=document.body.classList.contains('dark-mode')?'☀️ 白天':'&#9790; 夜间';
}
// Mobile drawer
function toggleDrawer(){
  document.getElementById('navDrawer').classList.toggle('open');
}
function closeDrawer(){
  document.getElementById('navDrawer').classList.remove('open');
}

renderVideoList();
</script>
