<style>

.seg-jmp:hover{background:#c9a227;color:#0a1628}

.notes textarea{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px;font-size:.85rem;resize:vertical;min-height:70px;font-family:inherit}
.notes textarea:focus{outline:none;border-color:#c9a227}
.notes-save{margin-top:6px;background:#c9a227;color:#0a1628;border:none;padding:7px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-size:.82rem}
.notes-list{margin-top:14px}
.note-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px;margin-bottom:8px;position:relative}
.note-del{position:absolute;top:8px;right:10px;background:none;border:none;color:#9ca3af;cursor:pointer;font-size:1.1rem}

.ctrl input,.ctrl select{background:#1a2744;color:#e0e0e0;border-color:#444}
.notes textarea{background:#162032;color:#e0e0e0;border-color:#444}
footer{background:#0d1b2a;color:#888}
.notes{background:#1a1a2e}
.note-card{background:#162032;border-color:#333}
.note-text{color:#c0c0c0}

<body>
<header>
  <div>
    <div class="h-brand">&#128202; Li Lu 研究</div>

<main>
  <div class="vid-box">
    <h3>CCBC Fireside Chat: Value Investing in China</h3>
    <p>Li Lu &times; Bruce Greenwald &middot; Columbia &middot; 1h32m</p>
    <a href="https://www.youtube.com/watch?v=FiHrWy2jGbA" target="_blank" class="vid-btn">&#9654; Watch on YouTube</a>
  </div>

  <div id="panels-seg" class="panels on">
    <div class="ctrl">
      <input type="text" id="srch" placeholder="Search..." oninput="render()">
      <select id="flt" onchange="render()">
        <option value="">All Topics</option>
        <option value="moat">Moat</option>
        <option value="china">China</option>
        <option value="character">Character</option>
        <option value="value">Valuation</option>
      </select>
    </div>
    <div class="scroller" id="seg-list"></div>
  </div>

  <div id="panels-notes" class="panels">
    <div class="notes">
      <div class="notes-in">
        <textarea id="note-txt" placeholder="Your notes..."></textarea>
        <button class="notes-save" onclick="saveNote()">&#128190; Save</button>
      </div>
      <div class="notes-list" id="note-list"></div>
    </div>
  </div>

  <footer>
    <span>&#128202; CCBC &middot; Study use only &middot; <a href="index.html">&larr; Home</a></span>
    <span style="color:#ef4444">Not investment advice</span>
  </footer>
</main>
<div class="toast" id="toast"></div>
<script>
var S=[
{id:1,t:"02:24",sp:"Host",tp:null,lb:"Opening Introduction",
zh:"主持人介绍 Bruce Greenwald 和李录。Bruce 是哥伦比亚商学院价值投资之父，培养了一代价值投资者包括李录在内。李录是喜马拉雅资本创始人，管理数十亿美元资产，专注于北美和亚洲长期投资。",
en:"Live streaming from Columbia Business School in New York City. Welcome to the final session of the 13th Columbia China Business Conference. Joining us today are Professor Bruce Greenwald and Mr. Lee Liu."},
{id:2,t:"04:37",sp:"Bruce",tp:null,lb:"Q1: Evolution of Investment Philosophy",
zh:"Bruce 开场：您的投资理念在过去28年是如何演变的？查理·芒格对您有什么影响？您的方法与巴菲特/芒格有何不同？",
en:"I've known Lee Liu now for more than 20 years. How has your investment philosophy evolved? In what ways has Charlie Munger influenced you?"},
{id:3,t:"08:00",sp:"Li Lu",tp:"moat",lb:"From Graham to Munger: Philosophy Evolution",
zh:"李录分享三阶段演进：1) 格雷厄姆雪茄烟蒂法（统计便宜）2) 优质小企业 3) 具有持久护城河和长赛道的伟大企业。核心：以内在价值以下的价格买入是明智的。芒格的影响远超投资，渗透到人生哲学。",
en:"Before I got exposed to value investing through Buffett's lecture at Bruce's class, my whole approach was along similar lines. The idea of buying something at a discount to intrinsic value is simply intelligent. I looked for value on the balance sheet in the classic style of Benjamin Graham. Over time I evolved into understanding smaller businesses, then looking for really good businesses with enduring competitive advantage and a long growth trajectory."},
{id:4,t:"12:30",sp:"Bruce",tp:null,lb:"Q2: What Makes a Great Business?",
zh:"Bruce 追问：什么是伟大企业的具体特征？有哪些可量化的指标？如何估值？",
en:"You mentioned finding great businesses. What specifically do you look for in a great business? What are the characteristics that make a business truly outstanding?"},
{id:5,t:"12:42",sp:"Li Lu",tp:"moat",lb:"ROIC and Moat: Standards for Great Businesses",
zh:"三个标准：1) ROIC 持续高于平均水平 2) 真正的护城河抵御竞争对手 3) 长期持续增长赛道。真正符合这三个条件的伟大企业极其罕见。一旦找到，长期持有是最佳策略。",
en:"Great businesses are the ones who really have above average return on invested capital - but that kind of businesses socially attract imitators and competitors. Truly good business is the one that can fend off competitors and have enduring competitive advantage with higher than average ROIC, and hopefully also have a long runway of continuous growth. They're rare - really really rare."},
{id:6,t:"15:00",sp:"Li Lu",tp:"character",lb:"Trust Moat: The Most Critical Factor",
zh:"李录最强调的护城河：信任。最高形式的文明是无缝的、值得信赖的信任之网。管理层的诚信和公平对待所有利益相关者创造最持久的护城河。选股需要学会读人。",
en:"The highest form which civilization can reach is a seamless web of deserved trust - not much procedure, just totally reliable people correctly trusting one another. For me, the most important moat is trust. In evaluating a business, it is critically important to understand the people that run them, particularly the top management."},
{id:7,t:"19:00",sp:"Li Lu",tp:"moat",lb:"Constant Change: Sustaining Competitive Advantage",
zh:"所有伟大企业都处于不断变化中。护城河必须不断重建才能保持相关性。竞争优势从来不是永久的。这是商业分析最有趣的维度。",
en:"All great businesses are in constant change. The moat must be continuously rebuilt to remain relevant. This is the most interesting dimension of business analysis."},
{id:8,t:"21:51",sp:"Bruce",tp:null,lb:"Q3: How Do You Invest Differently?",
zh:"Bruce 提问：您的方法与其他价值投资者有什么本质区别？您是如何形成自己独特的能力圈？",
en:"How do you invest differently from other value investors? We've talked a lot about the standard approach. You seem to have developed your own approach. What makes yours distinctive?"},
{id:9,t:"26:30",sp:"Li Lu",tp:"moat",lb:"From Small to Great Businesses: Stock Selection Evolution",
zh:"李录从完全不懂企业只看财报，演进到深入理解管理层。花大量时间与管理团队相处，无论好坏。判断一个人是否正直比读财务数字更重要。性格评估是艺术，不是科学。",
en:"I evolved from not understanding business at all, just looking at financial statements, to deeply understanding management. I spend a lot of time with management teams before investing, in good times and bad. Understanding whether a person will tell me the truth even when it is uncomfortable matters more than financial numbers."},
{id:10,t:"33:00",sp:"Li Lu",tp:"value",lb:"Margin of Safety and DCF Valuation",
zh:"DCF 是李录的核心估值工具，但关键是保守假设。好公司打折时买入更多。如果你对了，回报会复合；如果你错了，折扣保护你。",
en:"I use DCF as the primary tool, but the key is being conservative with assumptions. The margin of safety is not just about price - it is about understanding the business well enough that you are right even if the macro environment changes. I prefer to be right about the big things and tolerant of noise."},
{id:11,t:"38:00",sp:"Bruce",tp:null,lb:"Q4: Generalist or Specialist Investor?",
zh:"Bruce 提问：投资者应该是通才还是专才？在中国市场运作方式是否不同？",
en:"Do you think investors should be generalists or specialists? Do you think being a generalist serves you better, especially in the China market?"},
{id:12,t:"44:49",sp:"Li Lu",tp:"china",lb:"China: World's Most Dynamic Consumer Market",
zh:"中国30年来一直是全球最具活力的经济体，正在从投资驱动转向消费驱动。消费市场仍处于早期，将在未来几十年成为全球最大市场。东西方之间的信息不对称为理解文化、语言和治理的人创造了机会。",
en:"China has been the most dynamic economy in the world for the last 30 years, transitioning from investment-driven to consumption-driven economy. The consumer market is still in its early innings. The information asymmetry between Eastern and Western investors creates opportunities for those who are on the ground."},
{id:13,t:"50:00",sp:"Li Lu",tp:"china",lb:"Investment Opportunities Across China Sectors",
zh:"住房、服务、几乎所有行业都处于强劲增长阶段。中国的挑战不是找机会——而是高度选择性，因为机会超过资源。关键是找到有护城河的好公司。",
en:"Housing, services, virtually every industry is in a robust growth stage. The challenge in China is not finding opportunities - it is being highly selective because opportunities exceed your resources."},
{id:14,t:"55:00",sp:"Bruce",tp:null,lb:"Q5: Service Economy and Talent in China",
zh:"Bruce 提问：中国的服务业有哪些机会和人才挑战？您如何理解本地化特征？",
en:"What opportunities do you see in China's service economy? What about talent development and management challenges?"},
{id:15,t:"62:00",sp:"Bruce",tp:null,lb:"Q6: Investment Mistakes and Lessons",
zh:"Bruce 提问：回顾您的职业生涯，您最大的投资错误是什么？有哪些教训可以分享？普通人能学到什么？",
en:"Looking back on your career, what are some of your biggest investment mistakes? What lessons can you share with us?"},
{id:16,t:"62:01",sp:"Li Lu",tp:"china",lb:"Mistakes and Advice for Young Chinese Investors",
zh:"错误是投资的必要部分——关键是快速学习。对中国年轻投资者：广泛阅读，找好导师，从头理解企业。下一代面临前所未有的历史机遇。",
en:"Mistakes are a necessary part of investing. The key is learning from them quickly. For young people in China interested in investing: read everything, find mentors, understand businesses from the ground up."},
{id:17,t:"85:00",sp:"Li Lu",tp:"china",lb:"Asian-American: The Bridge Role",
zh:"李录最后呼吁：全球经济中心正在从大西洋转向太平洋。2000万亚裔美国人可以成为美国和亚洲之间独特的桥梁。",
en:"The center of the global economy is shifting from the Atlantic to the Pacific. Asian-American - 20 million strong - are going to play an increasingly important role."}
];

function render(){
  var q=document.getElementById("srch").value.toLowerCase();
  var flt=document.getElementById("flt").value;
  var cont=document.getElementById("seg-list");
  var html="";
  for(var i=0;i<S.length;i++){
    var s=S[i];
    if(flt&&s.tp!==flt)continue;
    if(q&&!s.lb.toLowerCase().includes(q)&&!s.zh.includes(q)&&!s.en.toLowerCase().includes(q))continue;
    var cls="seg"+(s.tp==="moat"?" gn":s.tp==="china"?" bl":s.tp==="character"?" pr":s.tp==="value"?" yw":"");
    var parts=s.t.split(":");
    var sec=parseInt(parts[0])*60+parseInt(parts[1]);
    var yt="https://www.youtube.com/watch?v=FiHrWy2jGbA&t="+sec;
    html+="<div class=\""+cls+"\">";
    html+="<div class=\"seg-time\">&#9201; "+s.t+" &middot; "+s.sp+"</div>";
    html+="<div class=\"seg-lbl\">"+s.lb+"</div>";
    html+="<div class=\"seg-zh\">"+s.zh+"</div>";
    html+="<div class=\"seg-en\" id=\"en"+s.id+"\">"+s.en+"</div>";
    html+="<div class=\"seg-exp\" onclick=\"toggleEn("+s.id+")\">&#9658; Show English</div>";
    html+="<div style=\"margin-top:10px\"><a href=\""+yt+"\" target=\"_blank\" class=\"seg-jmp\">&#9654; Jump to "+s.t+"</a></div>";
    html+="</div>";
  }
  cont.innerHTML=html||"<p class=\"emp\">No results</p>";
}

function toggleEn(id){
  var el=document.getElementById("en"+id);
  if(el.classList.contains("open")){
    el.classList.remove("open");
    el.previousElementSibling.textContent="\u25b8 Show English";
  }else{
    el.classList.add("open");
    el.previousElementSibling.textContent="\u25bc Hide English";
  }
}

function showTab(name){
  document.getElementById("panels-seg").className=name==="seg"?"panels on":"panels";
  document.getElementById("panels-notes").className=name==="notes"?"panels on":"panels";
}

function saveNote(){
  var tx=document.getElementById("note-txt").value.trim();
  if(!tx)return;
  var notes=JSON.parse(localStorage.getItem("lln4")||"[]");
  notes.unshift({t:tx,d:new Date().toLocaleString()});
  localStorage.setItem("lln4",JSON.stringify(notes));
  document.getElementById("note-txt").value="";
  renderNotes();
  tst("Saved");
}

function renderNotes(){
  var notes=JSON.parse(localStorage.getItem("lln4")||"[]");
  var cont=document.getElementById("note-list");
  if(!notes.length){cont.innerHTML="<p class=\"emp\">No notes yet</p>";return;}
  var html="";
  for(var i=0;i<notes.length;i++){
    html+="<div class=\"note-card\"><button class=\"note-del\" onclick=\"delNote("+i+")\">&times;</button>";
    html+="<div class=\"note-time\">&#128214; "+notes[i].d+"</div>";
    html+="<div class=\"note-text\">"+notes[i].t+"</div></div>";
  }
  cont.innerHTML=html;
}

function delNote(i){
  var notes=JSON.parse(localStorage.getItem("lln4")||"[]");
  notes.splice(i,1);
  localStorage.setItem("lln4",JSON.stringify(notes));
  renderNotes();
}

function tst(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.className="toast on";
  setTimeout(function(){t.className="toast";},2500);
}

render();
renderNotes();
</script>
</body>
</html>
