<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Li Lu Video Study - CCBC Fireside Chat</title>
<style>
:root{--d:#0a1628;--b:#1a365d;--g:#c9a227;--t:#1a1a1a;--m:#6b7280;--bd:#e5e7eb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f3f4f6;color:var(--t);line-height:1.6}
.h{background:linear-gradient(135deg,var(--d),var(--b));color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.h-brand{font-size:1.05rem;font-weight:700}.h-brand span{color:var(--g)}.h-sub{font-size:.78rem;opacity:.7}
.h-tabs{display:flex;gap:6px}
.tb{flex:1;padding:10px 8px;text-align:center;border:none;background:none;cursor:pointer;font-size:.82rem;color:var(--m);border-bottom:3px solid transparent;transition:all .2s}
.tb.on{color:var(--g);border-bottom-color:var(--g);font-weight:600}
.lay{max-width:900px;margin:0 auto}
.m{background:#fff;display:flex;flex-direction:column}
.vb{background:var(--d);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.vb h3{color:#fff;font-size:1rem;text-align:center;padding:0 20px}
.vb p{color:rgba(255,255,255,.6);font-size:.8rem}
.bw{background:var(--g);color:var(--d);padding:10px 22px;border-radius:30px;font-weight:700;text-decoration:none;font-size:.9rem}
.ct{display:none;flex:1;overflow-y:auto}.ct.on{display:block}
.crl{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;gap:8px;background:#f9fafb}
.crl input{flex:1;padding:6px 10px;border:1px solid var(--bd);border-radius:6px;font-size:.82rem}
.crl select{padding:6px 8px;border:1px solid var(--bd);border-radius:6px;font-size:.78rem;background:#fff}
.sc{flex:1;overflow-y:auto;padding:14px}
.sg{padding:14px 16px;margin-bottom:10px;border-radius:12px;border-left:5px solid transparent;cursor:pointer;transition:all .15s;background:#fff;border:1px solid var(--bd)}
.sg:hover{background:#fef9e7;border-color:var(--g)}
.sg.gn{background:#dcfce7;border-left-color:#16a34a}
.sg.bl{background:#dbeafe;border-left-color:#3b82f6}
.sg.pr{background:#f3e8ff;border-left-color:#9333ea}
.sg.yw{background:#fef9e7;border-left-color:var(--g)}
.sg-t{font-size:.72rem;font-weight:700;color:var(--g);margin-bottom:4px}
.sg-l{font-size:.75rem;font-weight:700;color:var(--b);margin-bottom:6px}
.sg-s{color:#374151;font-size:.85rem;line-height:1.75;margin-bottom:8px}
.sg-w{display:inline-block;font-size:.75rem;color:var(--g);font-weight:600;text-decoration:none;padding:4px 12px;border:1px solid var(--g);border-radius:20px;transition:all .2s}
.sg-w:hover{background:var(--g);color:var(--d)}
.ft{padding:10px 16px;background:#f9fafb;border-top:1px solid var(--bd);font-size:.75rem;color:var(--m);display:flex;justify-content:space-between}
.ft a{color:var(--g);text-decoration:none}
.ni{margin-bottom:14px}
.ni textarea{width:100%;padding:10px;border:1px solid var(--bd);border-radius:10px;font-size:.85rem;resize:vertical;min-height:70px;font-family:inherit}
.ni textarea:focus{outline:none;border-color:var(--g)}
.bs{margin-top:6px;background:var(--g);color:var(--d);border:none;padding:7px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-size:.82rem}
.nc{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:8px;position:relative}
.nd{position:absolute;top:8px;right:10px;background:none;border:none;color:#9ca3af;cursor:pointer;font-size:1.1rem}
.nd:hover{color:#ef4444}
.nt{font-size:.7rem;color:var(--g);font-weight:600;margin-bottom:3px}
.nx{font-size:.85rem;color:#374151;line-height:1.6}
.emp{text-align:center;color:var(--m);font-size:.85rem;margin-top:40px}
.tost{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--d);color:#fff;padding:8px 20px;border-radius:30px;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:1000;pointer-events:none}
.tost.on{opacity:1}
</style>
</head>
<body>

<div class="h">
  <div>
    <div class="h-brand">&#128200; <span>Li Lu</span> Video Study</div>
    <div class="h-sub">CCBC Fireside Chat &middot; Value Investing in China &middot; 1h32m</div>
  </div>
  <div class="h-tabs">
    <button class="tb on" id="btn-list" onclick="showTab('list')">&#128203; Segments</button>
    <button class="tb" id="btn-notes" onclick="showTab('notes')">&#128214; Notes</button>
  </div>
</div>

<div class="lay">
  <div class="m">
    <div class="vb">
      <h3>CCBC Fireside Chat: Value Investing in China</h3>
      <p>Li Lu &times; Bruce Greenwald &middot; Columbia &middot; 1h32m</p>
      <a href="https://www.youtube.com/watch?v=FiHrWy2jGbA" target="_blank" class="bw">&#9654; Watch on YouTube</a>
    </div>

    <div id="tab-list" class="ct on">
      <div class="crl">
        <input type="text" id="srch" placeholder="Search..." oninput="render()">
        <select id="flt" onchange="render()">
          <option value="">All Topics</option>
          <option value="moat">Moat</option>
          <option value="china">China</option>
          <option value="character">Character</option>
          <option value="value">Valuation</option>
        </select>
      </div>
      <div class="sc" id="sg-list"></div>
    </div>

    <div id="tab-notes" class="ct">
      <div style="padding:14px">
        <div class="ni">
          <textarea id="ntx" placeholder="Your notes..."></textarea>
          <button class="bs" onclick="svNote()">&#128190; Save</button>
        </div>
        <div id="nt-lst"></div>
      </div>
    </div>

    <div class="ft">
      <span>&#128202; CCBC &middot; Columbia China Business Conference &middot; Study use only</span>
      <a href="index.html">&larr; Research Home</a>
    </div>
  </div>
</div>

<div class="tost" id="tost"></div>

<script>
var SEGMENTS = [
{id:1,time:"02:24",speaker:"Host",topic:null,label:"Opening Introduction",
summary:"Host introduces Bruce Greenwald and Li Lu. Bruce is the godfather of value investing at Columbia Business School, having trained a generation of value investors including Li Lu. Li Lu is founder of Himalaya Capital, managing billions in assets, focused on long-term investments in Asia and North America."},
{id:2,time:"04:37",speaker:"Bruce",topic:null,label:"Q1: Evolution of Investment Philosophy",
summary:"Bruce opens: How has your investment philosophy evolved over the past 28 years? What influences from Charlie Munger? How does your approach differ from Buffett/Munger's?"},
{id:3,time:"08:00",speaker:"Li Lu",topic:"moat",label:"From Graham to Munger: Philosophy Evolution",
summary:"Li Lu shares his three-stage evolution: 1) Initially influenced by Graham's 'cigar butt' approach (statistical cheapness, balance sheet focus) 2) Mid-stage shift to quality small businesses (deep understanding of operations) 3) Final focus on businesses with durable competitive advantages and long runways. Core framework: buying below intrinsic value is simply intelligent. Munger's influence extends far beyond investing into life philosophy."},
{id:4,time:"12:30",speaker:"Bruce",topic:null,label:"Q2: What Makes a Great Business?",
summary:"Bruce probes: What specific characteristics make a business 'great'? What are the quantifiable metrics? How do you value them?"},
{id:5,time:"12:42",speaker:"Li Lu",topic:"moat",label:"ROIC & Moat: Standards for Great Businesses",
summary:"Li Lu's three criteria: 1) ROIC consistently above average 2) True moat that fends off competitors 3) Long continuous growth runway. Truly great businesses meeting all three are extremely rare - like finding a needle in a haystack. Once found, holding long-term is the best strategy. Returns perfectly correlate with company's ROIC."},
{id:6,time:"15:00",speaker:"Li Lu",topic:"character",label:"Trust Moat: The Most Critical Factor",
summary:"The moat Li Lu emphasizes most: trust. 'The highest form of civilization is a seamless web of deserved trust' - reliable people trusting each other without complex procedures. Management integrity and treating all stakeholders fairly creates the most durable moat. Picking stocks requires first learning to read people."},
{id:7,time:"19:00",speaker:"Li Lu",topic:"moat",label:"Constant Change: Sustaining Competitive Advantage",
summary:"All great businesses are in constant flux. The moat must be continuously rebuilt to remain relevant. This is the most interesting dimension of business analysis - competitive advantage is never permanent."},
{id:8,time:"21:51",speaker:"Bruce",topic:null,label:"Q3: How Do You Invest Differently?",
summary:"Bruce probes: What is the essential difference between your approach and Buffett/Munger's approach? How did you develop your own unique circle of competence?"},
{id:9,time:"26:30",speaker:"Li Lu",topic:"moat",label:"From Small to Great Businesses: Stock Selection Evolution",
summary:"Li Lu evolved from不懂商业, only reading financial statements, to deeply understanding management. He spends extensive time with management teams in good times and bad. Understanding whether a person is upright and trustworthy matters more than看懂 financial numbers. This requires years of experience - it's an art, not a science."},
{id:10,time:"33:00",speaker:"Li Lu",topic:"value",label:"Margin of Safety & DCF Valuation",
summary:"DCF is Li Lu's core valuation tool, but the key is conservative assumptions. Buy more when good companies are on sale. 'If you're right, returns compound over time; if you're wrong, the discount protects you' - that's the true meaning of margin of safety. Be right about the big things, tolerant of noise."},
{id:11,time:"38:00",speaker:"Bruce",topic:null,label:"Q4: Generalist or Specialist Investor?",
summary:"Bruce asks: Should investors become generalists (broad learning across industries) or specialists (deep expertise in one area)? Does this strategy work differently in the China market?"},
{id:12,time:"44:49",speaker:"Li Lu",topic:"china",label:"China: World's Most Dynamic Consumer Market",
summary:"China has been the world's most dynamic economy for the past 30 years, transitioning from investment-driven to consumption-driven. The consumer market is still in early innings and will be the world's largest for decades to come. Information asymmetry between Eastern and Western investors creates unique opportunities for those who deeply understand the culture, language, and governance."},
{id:13,time:"50:00",speaker:"Li Lu",topic:"china",label:"Investment Opportunities Across China Sectors",
summary:"Housing, services, and nearly every industry are growing rapidly. The challenge in China isn't finding opportunities - it's being highly selective because opportunities exceed resources. The key is finding good companies with moats."},
{id:14,time:"55:00",speaker:"Bruce",topic:null,label:"Q5: Service Economy & Talent in China",
summary:"Bruce asks: What unique opportunities do you see in China's service economy? What talent development and management challenges exist? How do you understand localization characteristics?"},
{id:15,time:"62:00",speaker:"Bruce",topic:null,label:"Q6: Investment Mistakes & Lessons",
summary:"Bruce asks: Looking back on your career, what were your biggest investment mistakes? What lessons can you share? What can ordinary people learn from them?"},
{id:16,time:"62:01",speaker:"Li Lu",topic:"china",label:"Mistakes & Advice for Young Chinese Investors",
summary:"Mistakes are a necessary part of investing - the key is learning quickly from them. Advice for young Chinese: read widely, find truly good mentors, understand businesses from the ground up. The next generation in China faces unprecedented historic opportunities - China will become the world's largest consumer market."},
{id:17,time:"85:00",speaker:"Li Lu",topic:"china",label:"Asian-American: The Bridge Role",
summary:"Li Lu's final call: The center of global economy is shifting from Atlantic to Pacific. 20 million Asian-Americans can serve as a unique bridge between America and Asia - beneficial not just for individuals but for America's long-term prosperity."}
];

function render() {
  var q = document.getElementById('srch').value.toLowerCase();
  var flt = document.getElementById('flt').value;
  var cont = document.getElementById('sg-list');
  var html = '';
  for (var i = 0; i < SEGMENTS.length; i++) {
    var s = SEGMENTS[i];
    if (flt && s.topic !== flt) continue;
    if (q && !s.label.toLowerCase().includes(q) && !s.summary.toLowerCase().includes(q)) continue;
    var cls = 'sg' + (s.topic === 'moat' ? ' gn' : s.topic === 'china' ? ' bl' : s.topic === 'character' ? ' pr' : s.topic === 'value' ? ' yw' : '');
    var parts = s.time.split(':');
    var sec = parseInt(parts[0]) * 60 + parseInt(parts[1]);
    var yt = 'https://www.youtube.com/watch?v=FiHrWy2jGbA&t=' + sec;
    html += '<div class="' + cls + '" onclick="window.open(\'' + yt + '\',\'_blank\')">';
    html += '<div class="sg-t">&#9201; ' + s.time + ' &middot; ' + s.speaker + '</div>';
    html += '<div class="sg-l">' + s.label + '</div>';
    html += '<div class="sg-s">' + s.summary + '</div>';
    html += '<span class="sg-w">&#9654; Jump to ' + s.time + '</span></div>';
  }
  cont.innerHTML = html || '<p class="emp">No results</p>';
}

function showTab(name) {
  document.getElementById('tab-list').className = name === 'list' ? 'ct on' : 'ct';
  document.getElementById('tab-notes').className = name === 'notes' ? 'ct on' : 'ct';
  document.getElementById('btn-list').className = name === 'list' ? 'tb on' : 'tb';
  document.getElementById('btn-notes').className = name === 'notes' ? 'tb on' : 'tb';
}

function svNote() {
  var tx = document.getElementById('ntx').value.trim();
  if (!tx) return;
  var notes = JSON.parse(localStorage.getItem('lln') || '[]');
  notes.unshift({ t: tx, d: new Date().toLocaleString() });
  localStorage.setItem('lln', JSON.stringify(notes));
  document.getElementById('ntx').value = '';
  rndNotes();
  tst('Saved');
}

function rndNotes() {
  var notes = JSON.parse(localStorage.getItem('lln') || '[]');
  var cont = document.getElementById('nt-lst');
  if (!notes.length) { cont.innerHTML = '<p class="emp">No notes yet</p>'; return; }
  var html = '';
  for (var i = 0; i < notes.length; i++) {
    html += '<div class="nc"><button class="nd" onclick="dlNote(' + i + ')">&times;</button>';
    html += '<div class="nt">&#128214; ' + notes[i].d + '</div>';
    html += '<div class="nx">' + notes[i].t + '</div></div>';
  }
  cont.innerHTML = html;
}

function dlNote(i) {
  var notes = JSON.parse(localStorage.getItem('lln') || '[]');
  notes.splice(i, 1);
  localStorage.setItem('lln', JSON.stringify(notes));
  rndNotes();
}

function tst(msg) {
  var t = document.getElementById('tost');
  t.textContent = msg; t.className = 'tost on';
  setTimeout(function() { t.className = 'tost'; }, 2500);
}

render();
rndNotes();
</script>
</body>
</html>
