<script>


// Auto dark mode based on system preference


if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {


  document.body.classList.add('dark-mode');


}





// Dark mode toggle


function toggleTheme() {
  document.body.classList.toggle('dark-mode');
  updateThemeToggle();
}

function updateThemeToggle() {
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  const isDark = document.body.classList.contains('dark-mode');
  btn.innerHTML = isDark ? '&#9790; еӨңй—ҙ' : '&#9728; ж—Ҙй—ҙ';
}

// Initialize theme toggle button state
document.addEventListener('DOMContentLoaded', updateThemeToggle);





// Quick search function


function searchContent() {


  const input = document.getElementById('searchInput');


  const filter = input.value.toUpperCase();


  const sections = document.querySelectorAll('section, .card, .quote-card, .book-card, .video-card');


  


  sections.forEach(section => {


    const text = section.textContent || section.innerText;


    if (text.toUpperCase().indexOf(filter) > -1) {


      section.style.display = "";


    } else {


      section.style.display = "none";


    }


  });


  


  if (filter === '') {


    sections.forEach(s => s.style.display = '');


  }


}


</script>
